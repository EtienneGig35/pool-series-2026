name: Update NHL Data

on:
  schedule:
    # Every 3 hours during playoffs (April-June)
    - cron: '0 */3 * 4-6 *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch NHL data
        run: python3 fetch-nhl-data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhl-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update NHL data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
